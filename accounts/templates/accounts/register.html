<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Registration - Guru Diary</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/guru.css' %}">
    <style>
        @media (prefers-color-scheme: dark) { body { color-scheme: dark; } }
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="card auth-card">
            <div class="head">
                <div class="kicker">Lecturer Registration</div>
                <div class="appname">Guru Diary</div>
                <p class="sub">Create your lecturer account</p>
            </div>

            {% if errors %}
                <div class="alert">
                    Please fix the following:
                    <ul style="margin: 8px 0 0 18px;">
                        {% for error in errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                <div style="height: 10px;"></div>
            {% endif %}

            <form method="post" class="stack">
                {% csrf_token %}
                <div class="field">
                    <label for="username">Username</label>
                    <input class="input" type="text" name="username" id="username" required value="{{ request.POST.username|default:'' }}">
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input class="input" type="email" name="email" id="email" required value="{{ request.POST.email|default:'' }}">
                </div>

                <div class="row">
                    <div class="field" style="flex:1; min-width: 210px;">
                        <label for="first_name">First name</label>
                        <input class="input" type="text" name="first_name" id="first_name" value="{{ request.POST.first_name|default:'' }}">
                    </div>
                    <div class="field" style="flex:1; min-width: 210px;">
                        <label for="last_name">Last name</label>
                        <input class="input" type="text" name="last_name" id="last_name" value="{{ request.POST.last_name|default:'' }}">
                    </div>
                </div>

                <div class="field">
                    <label for="password1">Password</label>
                    <input class="input" type="password" name="password1" id="password1" required>
                    <div class="hint">Minimum 8 characters.</div>
                </div>

                <div class="field">
                    <label for="password2">Confirm password</label>
                    <input class="input" type="password" name="password2" id="password2" required>
                </div>

                <button type="submit" class="btn btn-primary">Create account</button>
            </form>

            <div style="height: 14px;"></div>
            <div class="muted">
                Already have an account? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
